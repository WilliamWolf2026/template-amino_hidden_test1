name: "Scaffold Release"

on:
  push:
    tags:
      - "scaffold-v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse release info
        id: release
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#scaffold-v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)

          PREV_TAG=$(git describe --tags --abbrev=0 "$TAG^" --match "scaffold-v*" 2>/dev/null || echo "")

          IS_MAJOR=false
          if [ -n "$PREV_TAG" ]; then
            PREV_MAJOR=$(echo "${PREV_TAG#scaffold-v}" | cut -d. -f1)
            if [ "$MAJOR" != "$PREV_MAJOR" ]; then
              IS_MAJOR=true
            fi
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          echo "is_major=$IS_MAJOR" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG="${{ steps.release.outputs.prev_tag }}"
          VERSION="${{ steps.release.outputs.version }}"
          IS_MAJOR="${{ steps.release.outputs.is_major }}"

          {
            if [ "$IS_MAJOR" = "true" ]; then
              echo "> [!CAUTION]"
              echo "> **Breaking change** — games must use a full merge, not selective sync."
              echo "> \`\`\`bash"
              echo "> git fetch scaffold && git merge scaffold/main"
              echo "> \`\`\`"
              echo ""
            fi

            echo "## Update your game"
            echo ""
            echo "\`\`\`bash"
            echo "bun run scaffold:sync"
            echo "bun run scaffold:verify"
            echo "\`\`\`"
            echo ""

            if [ -n "$PREV_TAG" ]; then
              echo "## Changes since $PREV_TAG"
              echo ""
              git log "$PREV_TAG".."${{ steps.release.outputs.tag }}" --pretty=format:"- %s (%h)" --no-merges
              echo ""
            fi
          } > release-notes.md

          cat release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release.outputs.tag }}" \
            --title "Scaffold v${{ steps.release.outputs.version }}" \
            --notes-file release-notes.md
